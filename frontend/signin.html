<!DOCTYPE html>

<html class="dark" lang="en"><head>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

        }

<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4 pb-4">
<!-- Modal Container -->
<div class="w-full max-w-[480px] overflow-hidden rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-2xl pb-4">

<div class="flex flex-col gap-2 p-8 pb-4">

<div class="px-8 pb-8 pt-2 pb-4">

<div class="pb-4">

<svg class="h-5 w-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span>Continue with Google</span>
</button>
</div>
<!-- Divider -->
<!-- Form -->
<!-- Footer Toggle -->
<p class="mt-8 text-center text-sm text-slate-600 dark:text-slate-400">
                Don't have an account yet? 
                <a class="font-bold text-primary hover:underline" href="#">Create an account</a>
</p>
</div>
<!-- Trust Indicators -->
<div class="bg-slate-50 dark:bg-slate-800/50 p-4 flex justify-center items-center gap-6">
<div class="flex items-center gap-1.5 grayscale opacity-60">
<span class="material-symbols-outlined text-lg">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Secure SSL</span>
</div>
<div class="flex items-center gap-1.5 grayscale opacity-60">
<span class="material-symbols-outlined text-lg">encrypted</span>
<span class="text-[10px] font-bold uppercase tracking-wider">256-bit AES</span>
</div>
</div>
</div>
<!-- Background Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] h-[40%] w-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] h-[40%] w-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
</div>
</div>
