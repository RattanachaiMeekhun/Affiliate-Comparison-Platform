<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .form-input:focus {
            box-shadow: 0 0 0 2px rgba(19, 109, 236, 0.2);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="w-full max-w-[480px] bg-white dark:bg-slate-900/50 backdrop-blur-md rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
<!-- Modal Header -->
<div class="px-8 pt-8 pb-4">
<div class="flex flex-col gap-1">
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Create Account</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Join our tech community today and start building.</p>
</div>
</div>
<!-- Modal Content -->
<div class="px-8 pb-8">
<form class="flex flex-col gap-5">
<!-- Social Sign Up -->
<button class="flex items-center justify-center gap-3 w-full h-12 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-750 transition-colors duration-200 bg-primary text-white border-none hover:bg-primary/90" type="button">
<img alt="Google Logo" class="w-5 h-5 bg-white p-0.5 rounded-full" data-alt="Official Google multi-colored G logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuApABMeTAhEOX16ni0RgH_1E8K3ibzNPa3EhG3gnj8rdn6YG-_hTiSOj8TH82F9vbgAE-W-NfdQjVJvR95Lm2_ktF6HQCoRQjMvl-x0NxyBaHJwQlIIgEA_F0ThP4pGHtRX6l89riTsNzmksdnWiZoqLQRqIB0MPJeKZAUGZKLAhhPKw0L_wmnWbA9gSGR0u2-RHj4VM8C4F9UXahGw7RDzYGi485wvP7KcvDZ8fgvkpNnH1WMfzBfTZRlLIyrBuKMSWYmzTKgkBps"/>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-200 text-white">Continue with Google</span>
</button>
<!-- Divider -->
<!-- Input Fields -->
<!-- Terms & Conditions -->
<div class="flex items-start gap-3 mt-1 mt-4">
<input class="mt-1 h-4 w-4 rounded border-slate-300 dark:border-slate-700 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 transition-colors" id="terms" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 leading-tight" for="terms">
                        I agree to the <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a> and <a class="text-primary hover:underline font-medium" href="#">Privacy Policy</a>
</label>
</div>
<!-- Submit Button -->
<!-- Footer Link -->
<p class="text-center text-sm text-slate-600 dark:text-slate-400">
                    Already have an account? <a class="text-primary hover:underline font-semibold" href="#">Sign In</a>
</p>
</form>
</div>
<!-- Decorative Progress (Visual Only) -->
<div class="h-1 w-full bg-slate-100 dark:bg-slate-800">
<div class="h-full bg-primary w-1/4"></div>
</div>
</div>
</body></html>
